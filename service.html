    <link rel="stylesheet" href="bg.css">
    <title>Steer Cult - Services</title>
    <div class="services" id="services">
    <h2>Smart Car Diagnosis</h2>

    <div class="vehicle-box">
        <input id="carModel" placeholder="Enter car model (Example: Honda Civic 2016)">
    </div>
       
   <div class="service-buttons">
        <button class="btn" onclick="openScanner()">Scan OBD Code</button>

    </div>
</div>
